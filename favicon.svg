<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background: brand light blue rounded square (like app icon) -->
  <rect width="100" height="100" rx="20" fill="#E8F0FE"/>

  <!-- Chimney (left of roof peak) -->
  <rect x="38" y="17" width="10" height="20" rx="2" fill="#162038"/>

  <!-- Roof triangle (peak slightly right of center to match logo) -->
  <polygon points="56,10 86,38 26,38" fill="#162038"/>

  <!-- House walls -->
  <rect x="28" y="36" width="58" height="42" rx="2" fill="#162038"/>

  <!-- 4-pane window (2×2 grid) -->
  <rect x="45" y="44" width="11" height="10" rx="1.5" fill="#90B8F5"/>
  <rect x="59" y="44" width="11" height="10" rx="1.5" fill="#90B8F5"/>
  <rect x="45" y="57" width="11" height="10" rx="1.5" fill="#90B8F5"/>
  <rect x="59" y="57" width="11" height="10" rx="1.5" fill="#90B8F5"/>

  <!-- 3 concentric C-arcs to the LEFT of the house (sweep=0 = counterclockwise = leftward) -->
  <!-- Innermost arc (cyan) – semicircle radius=17 at left wall x=28 -->
  <path d="M28 72 A17 17 0 0 0 28 38" fill="none" stroke="#06B6D4" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Middle arc (brand blue) -->
  <path d="M22 79 A25 25 0 0 0 22 31" fill="none" stroke="#2350F5" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Outermost arc (deep blue) -->
  <path d="M16 85 A33 33 0 0 0 16 25" fill="none" stroke="#1435C0" stroke-width="4.5" stroke-linecap="round"/>
</svg>
